@if (viewsEnabled()) {
  <div class="qg-grid-views-group">
    <div class="qg-grid-views">
      <ui-select
        class="qg-grid-views__select"
        [items]="presetItems()"
        [size]="size()"
        [ngModel]="selectedPresetId()"
        (selectionChange)="onPresetSelected($event)"
        [placeholder]="viewsPlaceholder()"
      />

      @if (canUpdateSelected()) {
        <ui-button
          appearance="outline"
          [size]="size()"
          icon="save"
          variant="secondary"
          [uiTooltip]="updateViewLabel()"
          uiTooltipPosition="top"
          [attr.aria-label]="updateViewLabel()"
          (click)="updatePreset()"
        />
      }

      <ui-button
        appearance="outline"
        [size]="size()"
        icon="add"
        variant="secondary"
        [uiTooltip]="saveAsViewLabel()"
        uiTooltipPosition="top"
        [attr.aria-label]="saveAsViewLabel()"
        (click)="openSaveDialog()"
      />

      @if (canDeleteSelected()) {
        <ui-button
          appearance="outline"
          [size]="size()"
          icon="delete"
          variant="danger"
          [uiTooltip]="deleteViewLabel()"
          uiTooltipPosition="top"
          [attr.aria-label]="deleteViewLabel()"
          (click)="deleteSelected()"
        />
      }
    </div>

    <span class="qg-grid-views__divider" aria-hidden="true"></span>
  </div>

  <dialog #saveDialog class="qg-grid-views__dialog" (cancel)="closeSaveDialog()">
    <form class="qg-grid-views__dialog-form" (submit)="onSaveSubmit($event)">
      <h3 class="qg-grid-views__dialog-title">{{ saveViewTitle() }}</h3>
      <ui-text
        [size]="size()"
        [ngModel]="newPresetName()"
        (ngModelChange)="newPresetName.set($event)"
        name="viewName"
        [placeholder]="viewNamePlaceholder()"
      />
      <div class="qg-grid-views__dialog-actions">
        <ui-button
          type="button"
          [size]="size()"
          [text]="cancelLabel()"
          appearance="outline"
          variant="secondary"
          (click)="closeSaveDialog()"
        />
        <ui-button type="submit" [size]="size()" [text]="saveLabel()" variant="primary" />
      </div>
    </form>
  </dialog>
}
