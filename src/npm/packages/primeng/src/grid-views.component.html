@if (viewsEnabled()) {
  <div class="qg-grid-views">
    <p-select
      class="qg-grid-views__select"
      [options]="presetOptions()"
      optionLabel="label"
      optionValue="value"
      [ngModel]="selectedPresetId()"
      (ngModelChange)="onPresetSelected($event)"
      placeholder="Views"
      [showClear]="true"
      size="small"
    />

    @if (isPresetDirty()) {
      <p-button
        type="button"
        label="Update view"
        icon="pi pi-save"
        severity="secondary"
        [outlined]="true"
        size="small"
        (onClick)="updatePreset()"
      />
    }

    <p-button
      type="button"
      label="Save as"
      icon="pi pi-plus"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="openSaveDialog()"
    />

    @if (canDeleteSelected()) {
      <p-button
        type="button"
        icon="pi pi-trash"
        severity="danger"
        [outlined]="true"
        size="small"
        (onClick)="deleteSelected()"
      />
    }
  </div>

  <p-dialog
    header="Save view"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '24rem' }"
    [visible]="showSaveDialog()"
    (visibleChange)="showSaveDialog.set($event)"
  >
    <div class="qg-grid-views__save-field">
      <input
        pInputText
        type="text"
        [ngModel]="newPresetName()"
        (ngModelChange)="newPresetName.set($event)"
        placeholder="View name"
        (keydown.enter)="saveAs()"
      />
      <p-button type="button" label="Save" (onClick)="saveAs()" />
    </div>
  </p-dialog>
}
