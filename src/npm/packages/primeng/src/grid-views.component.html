@if (viewsEnabled()) {
  <div class="qg-grid-views-group">
    <div class="qg-grid-views">
      <p-select
        class="qg-grid-views__select"
        [options]="presetOptions()"
        optionLabel="label"
        optionValue="value"
        [ngModel]="selectedPresetId()"
        (ngModelChange)="onPresetSelected($event)"
        [placeholder]="viewsPlaceholder()"
        [showClear]="true"
        size="small"
      />

      @if (canUpdateSelected()) {
        <p-button
          type="button"
          icon="pi pi-save"
          severity="secondary"
          [outlined]="true"
          size="small"
          [ariaLabel]="updateViewLabel()"
          [pTooltip]="updateViewLabel()"
          tooltipPosition="top"
          (onClick)="updatePreset()"
        />
      }

      <p-button
        type="button"
        icon="pi pi-plus"
        severity="secondary"
        [outlined]="true"
        size="small"
        [ariaLabel]="saveAsViewLabel()"
        [pTooltip]="saveAsViewLabel()"
        tooltipPosition="top"
        (onClick)="openSaveDialog()"
      />

      @if (canDeleteSelected()) {
        <p-button
          type="button"
          icon="pi pi-trash"
          severity="danger"
          [outlined]="true"
          size="small"
          [ariaLabel]="deleteViewLabel()"
          [pTooltip]="deleteViewLabel()"
          tooltipPosition="top"
          (onClick)="deleteSelected()"
        />
      }
    </div>

    <span class="qg-grid-views__divider" aria-hidden="true"></span>
  </div>

  <p-dialog
    [header]="saveViewTitle()"
    [modal]="true"
    [draggable]="false"
    [style]="{ width: '24rem' }"
    [visible]="showSaveDialog()"
    (visibleChange)="showSaveDialog.set($event)"
  >
    <div class="qg-grid-views__save-field">
      <input
        pInputText
        type="text"
        [ngModel]="newPresetName()"
        (ngModelChange)="newPresetName.set($event)"
        [placeholder]="viewNamePlaceholder()"
        (keydown.enter)="saveAs()"
      />
    </div>
    <ng-template #footer>
      <div class="qg-grid-views__dialog-footer">
        <p-button
          type="button"
          [label]="cancelLabel()"
          severity="secondary"
          [text]="true"
          (onClick)="closeSaveDialog()"
        />
        <p-button type="button" [label]="saveLabel()" (onClick)="saveAs()" />
      </div>
    </ng-template>
  </p-dialog>
}
