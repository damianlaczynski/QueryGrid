name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore src/dotnet/QueryGrid.slnx
      - name: Test
        run: dotnet test src/dotnet/QueryGrid.slnx -c Release --no-restore
      - name: Pack
        run: dotnet pack src/dotnet/QueryGrid.slnx -c Release --no-restore -o artifacts/nuget

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build:npm
      - name: Test
        run: npm run test:npm

  artifacts:
    needs: [dotnet, npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: dotnet pack src/dotnet/QueryGrid.slnx -c Release -o artifacts/nuget
      - run: npm ci && npm run build:npm
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            artifacts/nuget/*.nupkg
            src/npm/packages/core/dist
            src/npm/packages/primeng/dist
