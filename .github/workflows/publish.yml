name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Test
        run: |
          dotnet test src/dotnet/QueryGrid.slnx -c Release
          npm ci
          npm run lint:frontend
          npm run test:npm

      - name: Pack NuGet
        run: dotnet pack src/dotnet/QueryGrid.slnx -c Release -o artifacts/nuget

      - name: NuGet login (OIDC → nuget.org)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet to nuget.org
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
          dotnet nuget push artifacts/nuget/*.snupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Publish NuGet to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push artifacts/nuget/*.nupkg --source github --skip-duplicate
          dotnet nuget push artifacts/nuget/*.snupkg --source github --skip-duplicate
