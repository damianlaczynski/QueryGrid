name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        env:
          NUGET_USER: ${{ secrets.NUGET_USER }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          missing=0
          if [ -z "$NUGET_USER" ]; then
            echo "::error::Missing repository secret NUGET_USER (nuget.org profile name, not email)."
            missing=1
          fi
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Missing repository secret NPM_TOKEN (npm automation token with publish access)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Test
        run: |
          dotnet test src/dotnet/QueryGrid.slnx -c Release
          npm ci
          npm run lint:frontend
          npm run test:npm

      - name: Pack
        run: |
          dotnet pack src/dotnet/QueryGrid.slnx -c Release -o artifacts/nuget
          npm run pack:npm

      - name: NuGet login (OIDC → nuget.org)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish NuGet to nuget.org
        run: |
          dotnet nuget push artifacts/nuget/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
          dotnet nuget push artifacts/nuget/*.snupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} \
            --skip-duplicate

      - name: Publish NuGet to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push artifacts/nuget/*.nupkg --source github --skip-duplicate
          dotnet nuget push artifacts/nuget/*.snupkg --source github --skip-duplicate

      - name: Publish npm to npmjs.com
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            NPM_TAG=preview
          else
            NPM_TAG=latest
          fi
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${NPM_TOKEN}
          EOF
          npm publish "artifacts/npm/query-grid-core-${VERSION}.tgz" --access public --tag "$NPM_TAG"
          npm publish "artifacts/npm/query-grid-primeng-${VERSION}.tgz" --access public --tag "$NPM_TAG"
          npm publish "artifacts/npm/query-grid-ui-${VERSION}.tgz" --access public --tag "$NPM_TAG"

      - name: Publish npm to GitHub Packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > .npmrc <<EOF
          @query-grid:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
          npm publish "artifacts/npm/query-grid-core-${VERSION}.tgz" --registry https://npm.pkg.github.com
          npm publish "artifacts/npm/query-grid-primeng-${VERSION}.tgz" --registry https://npm.pkg.github.com
          npm publish "artifacts/npm/query-grid-ui-${VERSION}.tgz" --registry https://npm.pkg.github.com

      - name: Extract release notes
        run: node scripts/extract-changelog.mjs "${GITHUB_REF_NAME#v}" > release-notes.md

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
